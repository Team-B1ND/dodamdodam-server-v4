spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth.dodam.svc.cluster.local:8080
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://user.dodam.svc.cluster.local:8080
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
        - id: wakeup-song-service
          uri: http://wakeup.dodam.svc.cluster.local:8080
          predicates:
            - Path=/wakeup-song/**
          filters:
            - StripPrefix=1
        - id: nightstudy-service
          uri: http://nightstudy.dodam.svc.cluster.local:8080
          predicates:
            - Path=/nightstudy/**
          filters:
            - StripPrefix=1
        - id: out-sleeping-service
          uri: http://out-sleeping.dodam.svc.cluster.local:8080
          predicates:
            - Path=/out-sleeping/**
          filters:
            - StripPrefix=1
        - id: inapp-service
          uri: http://inapp.dodam.svc.cluster.local:8080
          predicates:
            - Path=/inapp/**
          filters:
            - StripPrefix=1
        - id: file-service
          uri: http://file.dodam.svc.cluster.local:8080
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1
        - id: oauth-service
          uri: http://oauth.dodam.svc.cluster.local:8080
          predicates:
            - Path=/oauth/**
          filters:
            - StripPrefix=1
        - id: neis-service
          uri: http://neis.dodam.svc.cluster.local:8080
          predicates:
            - Path=/neis/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: http://notification.dodam.svc.cluster.local:8080
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

app:
  auth:
    url: http://auth.dodam.svc.cluster.local:8080
server:
  port: 8080
