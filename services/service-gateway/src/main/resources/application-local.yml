spring:
  data:
    redis:
      port: 6379
      host: localhost
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
        - id: wakeup-song-service
          uri: http://localhost:8083
          predicates:
            - Path=/wakeup-song/**
          filters:
            - StripPrefix=1
        - id: inapp-service
          uri: http://localhost:8085
          predicates:
            - Path=/inapp/**
          filters:
            - StripPrefix=1
        - id: file-service
          uri: http://localhost:8086
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1
        - id: neis-service
          uri: http://localhost:8084
          predicates:
            - Path=/neis/**
          filters:
            - StripPrefix=1
        - id: oauth-service
          uri: http://localhost:8088
          predicates:
            - Path=/oauth/**
          filters:
            - StripPrefix=1
        - id: oauth-wellknown
          uri: http://localhost:8088
          predicates:
            - Path=/.well-known/**
          filters:
            - StripPrefix=2
        - id: nightstudy-service
          uri: http://localhost:8087
          predicates:
            - Path=/night-study/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

app:
  auth:
    url: http://localhost:8082
server:
  port: 8080

