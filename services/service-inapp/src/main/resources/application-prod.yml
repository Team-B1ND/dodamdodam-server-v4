spring:
  datasource:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-inapp
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
  flyway:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-inapp
    user: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

grpc:
  server:
    port: 9090
  client:
    service-user:
      address: 'static://user.dodam.svc.cluster.local:9090'
      negotiation-type: plaintext

app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer-group-id: service-inapp
