syntax = "proto3";

package inapp;

option java_multiple_files = true;
option java_package = "com.b1nd.dodamdodam.grpc.inapp";

service AppQueryService {

  rpc GetApp (GetAppRequest)
      returns (GetAppResponse);
}

message GetAppRequest {
  string app_public_id = 1;
}

message GetAppResponse {
  string app_public_id = 1;
  string name = 2;
  string icon_url = 3;
  string dark_icon_url = 4;
  string app_url = 5;
}
