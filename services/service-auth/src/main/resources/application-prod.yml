spring:
  datasource:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-auth
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  flyway:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-auth
    user: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

grpc:
  client:
    service-user:
      address: 'static://user.dodam.svc.cluster.local:9090'
      negotiation-type: plaintext
    service-inapp:
      address: 'static://inapp.dodam.svc.cluster.local:9090'
      negotiation-type: plaintext

server:
  port: 8080

app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer-group-id: service-auth
