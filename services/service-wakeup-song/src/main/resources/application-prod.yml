spring:
  datasource:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-wakeup-song
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
  flyway:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-wakeup-song
    user: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
