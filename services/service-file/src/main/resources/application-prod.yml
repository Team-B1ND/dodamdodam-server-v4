spring:
  datasource:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-file
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-file
    user: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

cloud:
  aws:
    s3:
      key-prefix: ${AWS_S3_KEY_PREFIX}

server:
  port: 8080
