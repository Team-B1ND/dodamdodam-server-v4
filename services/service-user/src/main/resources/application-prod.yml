spring:
  datasource:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-user
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
  flyway:
    url: jdbc:${DATABASE_DRIVER}://${DATABASE_HOST}:${DATABASE_PORT}/dodam-user
    user: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

grpc:
  server:
    port: 9090

app:
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
  sms:
    gabia:
      id: ${GABIA_ID}
      api-key: ${GABIA_API_KEY}
      ref-key: ${GABIA_REF_KEY}
      subject: ${GABIA_SMS_SUBJECT}
      sender-number: ${GABIA_SMS_SENDER}
      token-url: ${GABIA_TOKEN_URL}
      sms-url: ${GABIA_SMS_URL}
      lms-url: ${GABIA_LMS_URL}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer-group-id: service-user
