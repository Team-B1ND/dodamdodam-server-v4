spring:
  application:
    name: service-neis

  profiles:
    active: local

  flyway:
    locations: classpath:database/migration

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    config-url: ${app.swagger.gateway-prefix}/v3/api-docs/swagger-config
    url: ${app.swagger.gateway-prefix}/v3/api-docs

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

neis:
  edu-office-code: D10
  school-code: 7240454
  meal:
    api-key: ${NEIS_MEAL_API_KEY:}
  schedule:
    api-key: ${NEIS_SCHEDULE_API_KEY:}

time-table:
  school-name: 대구소프트웨어고등학교
  max-grade: 3
  max-room: 4

app:
  swagger:
    enabled: true
    gateway-prefix: /neis