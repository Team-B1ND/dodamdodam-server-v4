name: "CD Develop: Build"

on:
  push:
    branches: [develop]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      spring-services: ${{ steps.changes.outputs.spring-services }}
      node-services: ${{ steps.changes.outputs.node-services }}
      has-spring: ${{ steps.changes.outputs.has-spring }}
      has-node: ${{ steps.changes.outputs.has-node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          SPRING_SERVICES=()
          SPRING_LIST="gateway auth user wakeup-song inapp file neis out-sleeping nightstudy oauth"
          CORE_CHANGED=$(echo "$CHANGED" | grep -E "^(core/|buildSrc/|gradle/|build\.gradle|settings\.gradle)" || true)

          for service in $SPRING_LIST; do
            SVC_CHANGED=$(echo "$CHANGED" | grep "^services/service-${service}/" || true)
            if [ -n "$SVC_CHANGED" ] || [ -n "$CORE_CHANGED" ]; then
              SPRING_SERVICES+=("$service")
            fi
          done

          NODE_SERVICES=()
          if echo "$CHANGED" | grep -q "^services/service-notification/"; then
            NODE_SERVICES+=("notification")
          fi

          SPRING_JSON=$(printf '%s\n' "${SPRING_SERVICES[@]}" | jq -R . | jq -sc .)
          NODE_JSON=$(printf '%s\n' "${NODE_SERVICES[@]}" | jq -R . | jq -sc .)

          echo "spring-services=$SPRING_JSON" >> "$GITHUB_OUTPUT"
          echo "node-services=$NODE_JSON" >> "$GITHUB_OUTPUT"
          echo "has-spring=$( [ ${#SPRING_SERVICES[@]} -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has-node=$( [ ${#NODE_SERVICES[@]} -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

          echo "Spring services to build: ${SPRING_SERVICES[*]:-none}"
          echo "Node services to build: ${NODE_SERVICES[*]:-none}"

  build-gradle:
    needs: detect-changes
    if: needs.detect-changes.outputs.has-spring == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build
        run: chmod +x gradlew && ./gradlew build -x test --no-daemon

      - name: Rename JARs
        run: |
          for service in ${{ join(fromJSON(needs.detect-changes.outputs.spring-services), ' ') }}; do
            dir="services/service-${service}/build/libs"
            jar=$(find "$dir" -name "service-${service}-*.jar" ! -name "*-plain.jar" | head -1)
            if [ -n "$jar" ]; then
              cp "$jar" "$dir/service-${service}.jar"
            fi
          done

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: spring-jars
          retention-days: 1
          path: |
            services/*/build/libs/service-*.jar
            !services/*/build/libs/*-plain.jar

  build-node:
    needs: detect-changes
    if: needs.detect-changes.outputs.has-node == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        working-directory: services/service-notification
        run: npm ci && npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: node-builds
          retention-days: 1
          path: services/service-notification/

  push-and-deploy:
    needs: [detect-changes, build-gradle, build-node]
    if: always() && (needs.build-gradle.result == 'success' || needs.build-gradle.result == 'skipped') && (needs.build-node.result == 'success' || needs.build-node.result == 'skipped') && !(needs.build-gradle.result == 'skipped' && needs.build-node.result == 'skipped')
    uses: ./.github/workflows/cd-develop-push.yml
    secrets: inherit
    with:
      spring-services: ${{ needs.detect-changes.outputs.spring-services }}
      node-services: ${{ needs.detect-changes.outputs.node-services }}
