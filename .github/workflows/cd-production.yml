name: "CD Production"

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/dodam
  SPRING_SERVICES: "gateway auth user wakeup-song inapp file neis out-sleeping nightstudy oauth"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Spring services
        run: chmod +x gradlew && ./gradlew build -x test --no-daemon

      - name: Rename JARs
        run: |
          for service in $SPRING_SERVICES; do
            dir="services/service-${service}/build/libs"
            jar=$(find "$dir" -name "service-${service}-*.jar" ! -name "*-plain.jar" | head -1)
            if [ -n "$jar" ]; then
              cp "$jar" "$dir/service-${service}.jar"
            fi
          done

      - name: Upload Spring JARs
        uses: actions/upload-artifact@v4
        with:
          name: spring-jars
          retention-days: 1
          path: |
            services/*/build/libs/service-*.jar
            !services/*/build/libs/*-plain.jar

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Node service
        working-directory: services/service-notification
        run: npm ci && npm run build

      - name: Upload Node build
        uses: actions/upload-artifact@v4
        with:
          name: node-builds
          retention-days: 1
          path: services/service-notification/

  push:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        service: [gateway, auth, user, wakeup-song, inapp, file, neis, out-sleeping, nightstudy, oauth]
    steps:
      - name: Checkout (for Dockerfile)
        uses: actions/checkout@v4
        with:
          sparse-checkout: builds/develop

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: spring-jars
          path: services/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Resolve Dockerfile
        id: dockerfile
        run: |
          if [ -f "builds/develop/Dockerfile.${{ matrix.service }}" ]; then
            echo "file=builds/develop/Dockerfile.${{ matrix.service }}" >> "$GITHUB_OUTPUT"
          else
            echo "file=builds/develop/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: services/service-${{ matrix.service }}/build/libs
          file: ${{ steps.dockerfile.outputs.file }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:prod
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.version.outputs.tag }}
          build-args: JAR_FILE=service-${{ matrix.service }}.jar

  push-node:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: node-builds
          path: services/service-notification/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: services/service-notification
          file: services/service-notification/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-notification:prod
            ${{ env.IMAGE_PREFIX }}-notification:${{ steps.version.outputs.tag }}

  deploy:
    needs: [push, push-node]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rolling update on k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_CONTROL_PLANE_HOST }}
          username: ${{ secrets.K3S_CONTROL_PLANE_USER }}
          key: ${{ secrets.K3S_CONTROL_PLANE_SSH_KEY }}
          script: |
            TAG=${{ steps.version.outputs.tag }}
            PREFIX=teamb1nd/dodam
            KC="sudo k3s kubectl"

            SERVICES="gateway auth user wakeup-song inapp file neis out-sleeping nightstudy oauth notification"
            for svc in $SERVICES; do
              IMAGE="${PREFIX}-${svc}:${TAG}"
              $KC set image deployment/${svc} ${svc}=${IMAGE} -n dodam
            done

            echo "Waiting for rollout..."
            for svc in $SERVICES; do
              $KC rollout status deployment/${svc} -n dodam --timeout=180s
            done

            echo "All deployments rolled out to ${TAG}"
